<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вікторина: Технології та Безпека</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: rgba(255,255,255,0.07);
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #f0f0ff;
    --muted: #8080a0;
    --timer-warning: #f59e0b;
    --timer-danger: #ef4444;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content:'';
    position:fixed;inset:0;
    background-image: linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);
    background-size:48px 48px;
    pointer-events:none;z-index:0;
  }

  /* ─── SCREENS ─── */
  .screen { display:none; position:relative; z-index:1; }
  .screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem; }

  /* ─── REGISTRATION ─── */
  #reg-screen { gap:2rem; }
  .logo-area { text-align:center; }
  .logo-badge {
    display:inline-flex;align-items:center;gap:.6rem;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    padding:.5rem 1.2rem; border-radius:100px;
    font-family:'Unbounded',sans-serif;font-size:.7rem;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem;
  }
  h1 {
    font-family:'Unbounded',sans-serif;font-size:clamp(1.8rem,5vw,3rem);
    font-weight:800;line-height:1.1;text-align:center;
    background:linear-gradient(135deg,#fff 30%,var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:.5rem;
  }
  .subtitle { color:var(--muted);font-size:.95rem;text-align:center; }

  .reg-card {
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:2.5rem;width:100%;max-width:440px;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .reg-card h2 { font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:600;margin-bottom:1.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em; }
  .field { margin-bottom:1.2rem; }
  .field label { display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.06em; }
  .field input {
    width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:.85rem 1rem;color:var(--text);font-family:'Manrope',sans-serif;font-size:.95rem;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .field input:focus { border-color:var(--accent1);box-shadow:0 0 0 3px rgba(124,58,237,.2); }
  .field input::placeholder { color:var(--muted); }

  /* consent */
  .consent-row {
    display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1.5rem;
    padding:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;
  }
  .consent-row input[type=checkbox] { width:18px;height:18px;flex-shrink:0;accent-color:var(--accent1);margin-top:2px;cursor:pointer; }
  .consent-row span { font-size:.82rem;color:var(--muted);line-height:1.5; }
  .consent-row span a { color:var(--accent2);text-decoration:none; }
  .consent-row.error { border-color:var(--wrong); }

  .btn-start {
    width:100%;background:linear-gradient(135deg,var(--accent1),var(--accent2));
    border:none;border-radius:12px;padding:1rem;color:#fff;
    font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:600;
    cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.05em;
  }
  .btn-start:hover { opacity:.9;transform:translateY(-1px); }
  .btn-start:active { transform:translateY(0); }
  .btn-start:disabled { opacity:.4;cursor:not-allowed;transform:none; }

  /* ─── QUIZ ─── */
  #quiz-screen { padding:1rem; }
  .quiz-shell { width:100%;max-width:700px; }

  /* Header bar */
  .quiz-header {
    display:flex;align-items:center;justify-content:space-between;
    padding:1rem 1.5rem;background:var(--surface);
    border:1px solid var(--border);border-radius:16px;margin-bottom:1.5rem;
    gap:1rem;flex-wrap:wrap;
  }
  .qh-info { display:flex;flex-direction:column;gap:.15rem; }
  .qh-name { font-family:'Unbounded',sans-serif;font-size:.8rem;font-weight:600; }
  .qh-cat { font-size:.75rem;color:var(--muted); }
  .progress-area { flex:1;min-width:120px; }
  .progress-label { display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.3rem; }
  .progress-bar { height:4px;background:var(--border);border-radius:4px;overflow:hidden; }
  .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));transition:width .4s; }
  .score-chip {
    background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:.4rem .9rem;font-family:'Unbounded',sans-serif;
    font-size:.75rem;font-weight:600;
  }
  .score-chip span { color:var(--accent2); }

  /* Timer */
  .timer-area { display:flex;align-items:center;justify-content:center;margin-bottom:1.2rem; }
  .timer-ring-wrap { position:relative;width:64px;height:64px; }
  .timer-ring-wrap svg { transform:rotate(-90deg); }
  .timer-ring-bg { fill:none;stroke:var(--border);stroke-width:4; }
  .timer-ring-prog { fill:none;stroke:var(--accent2);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s; }
  .timer-num {
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Unbounded',sans-serif;font-size:.95rem;font-weight:800;
  }

  /* Question card */
  .q-card {
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:2rem;margin-bottom:1rem;box-shadow:0 20px 60px rgba(0,0,0,.4);
    animation: fadeUp .35s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .q-meta { display:flex;align-items:center;gap:.6rem;margin-bottom:1rem; }
  .q-num { font-family:'Unbounded',sans-serif;font-size:.7rem;font-weight:600;color:var(--accent1);text-transform:uppercase;letter-spacing:.08em; }
  .q-tag {
    font-size:.65rem;font-weight:600;padding:.2rem .6rem;border-radius:6px;
    text-transform:uppercase;letter-spacing:.06em;
  }
  .q-tag.code { background:rgba(124,58,237,.25);color:#a78bfa; }
  .q-tag.logic { background:rgba(6,182,212,.2);color:var(--accent2); }
  .q-tag.cyber { background:rgba(245,158,11,.15);color:var(--accent3); }
  .q-tag.iot { background:rgba(16,185,129,.15);color:var(--correct); }
  .q-text { font-size:1.05rem;line-height:1.7;margin-bottom:1.2rem; }
  .q-code {
    background:#0d0d1a;border:1px solid rgba(124,58,237,.3);border-radius:10px;
    padding:1rem 1.2rem;font-family:'Courier New',monospace;font-size:.83rem;
    line-height:1.7;color:#c4b5fd;overflow-x:auto;margin-bottom:1.2rem;
    white-space:pre;
  }

  /* Answers */
  .answers { display:flex;flex-direction:column;gap:.7rem; }
  .ans-btn {
    background:var(--surface2);border:2px solid var(--border);border-radius:12px;
    padding:.9rem 1.2rem;color:var(--text);text-align:left;cursor:pointer;
    font-family:'Manrope',sans-serif;font-size:.93rem;font-weight:500;
    display:flex;align-items:center;gap:.8rem;transition:all .15s;
  }
  .ans-btn:hover:not(:disabled) { border-color:var(--accent1);background:rgba(124,58,237,.12);transform:translateX(3px); }
  .ans-letter {
    width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.07);
    display:flex;align-items:center;justify-content:center;
    font-family:'Unbounded',sans-serif;font-size:.65rem;font-weight:700;flex-shrink:0;
  }
  .ans-btn.correct { border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important; }
  .ans-btn.correct .ans-letter { background:var(--correct);color:#fff; }
  .ans-btn.wrong { border-color:var(--wrong)!important;background:rgba(239,68,68,.12)!important; }
  .ans-btn.wrong .ans-letter { background:var(--wrong);color:#fff; }
  .ans-btn:disabled { cursor:default; }

  /* Explanation */
  .explanation {
    background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);
    border-radius:12px;padding:1rem 1.2rem;margin-top:.8rem;
    font-size:.87rem;line-height:1.7;color:#6ee7b7;
    animation:fadeUp .3s ease;
  }
  .explanation.wrong-exp { background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);color:#fca5a5; }

  /* Timeout banner */
  .timeout-banner {
    background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
    border-radius:12px;padding:.9rem 1.2rem;margin-top:.8rem;
    color:var(--accent3);font-size:.87rem;font-weight:500;text-align:center;
    animation:fadeUp .3s ease;
  }

  .btn-next {
    width:100%;margin-top:1rem;background:var(--surface2);
    border:1px solid var(--border);border-radius:12px;padding:.9rem;
    color:var(--text);font-family:'Unbounded',sans-serif;font-size:.8rem;
    font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.05em;
    display:none;
  }
  .btn-next.show { display:block; }
  .btn-next:hover { background:var(--accent1);border-color:var(--accent1); }

  /* ─── RESULTS ─── */
  #result-screen { gap:2rem; }
  .result-card { background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:620px;text-align:center; }
  .trophy { font-size:4rem;margin-bottom:1rem;display:block; }
  .result-name { font-family:'Unbounded',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:.3rem; }
  .result-cat { color:var(--muted);font-size:.85rem;margin-bottom:2rem; }
  .score-big { font-family:'Unbounded',sans-serif;font-size:4rem;font-weight:800;line-height:1;margin-bottom:.3rem;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .score-total { color:var(--muted);font-size:1rem;margin-bottom:2rem; }
  .stats-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2rem; }
  .stat-box { background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:1rem; }
  .stat-val { font-family:'Unbounded',sans-serif;font-size:1.4rem;font-weight:800; }
  .stat-val.green { color:var(--correct); }
  .stat-val.red { color:var(--wrong); }
  .stat-val.yellow { color:var(--accent3); }
  .stat-lbl { font-size:.72rem;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.06em; }
  .btn-rating { width:100%;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;border-radius:12px;padding:1rem;color:#fff;font-family:'Unbounded',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .2s;letter-spacing:.05em;margin-bottom:.7rem; }
  .btn-rating:hover { opacity:.9; }
  .btn-restart { width:100%;background:transparent;border:1px solid var(--border);border-radius:12px;padding:.9rem;color:var(--muted);font-family:'Manrope',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s; }
  .btn-restart:hover { border-color:var(--muted);color:var(--text); }

  /* ─── LEADERBOARD ─── */
  #lb-screen { gap:2rem; }
  .lb-card { background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2rem;width:100%;max-width:660px; }
  .lb-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem; }
  .lb-title { font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:800; }
  .lb-filter { display:flex;gap:.4rem; }
  .lb-filter-btn { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.4rem .8rem;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s; }
  .lb-filter-btn.active { background:rgba(124,58,237,.3);border-color:var(--accent1);color:var(--text); }

  .lb-table { width:100%; }
  .lb-row {
    display:grid;grid-template-columns:40px 1fr auto auto;align-items:center;gap:1rem;
    padding:.8rem .5rem;border-bottom:1px solid var(--border);
  }
  .lb-row:last-child { border-bottom:none; }
  .lb-row.top1 { background:linear-gradient(90deg,rgba(245,158,11,.08),transparent);border-radius:10px; }
  .lb-row.top2 { background:linear-gradient(90deg,rgba(148,163,184,.05),transparent);border-radius:10px; }
  .lb-row.top3 { background:linear-gradient(90deg,rgba(205,127,50,.05),transparent);border-radius:10px; }
  .lb-rank { font-family:'Unbounded',sans-serif;font-size:.85rem;font-weight:800;text-align:center; }
  .lb-rank.r1 { color:#fbbf24; }
  .lb-rank.r2 { color:#94a3b8; }
  .lb-rank.r3 { color:#cd7f32; }
  .lb-pname { font-weight:600;font-size:.93rem; }
  .lb-ptime { font-size:.73rem;color:var(--muted);margin-top:.1rem; }
  .lb-score { font-family:'Unbounded',sans-serif;font-size:.95rem;font-weight:700;color:var(--accent2); }
  .lb-empty { text-align:center;color:var(--muted);padding:3rem;font-size:.9rem; }
  .btn-back { background:transparent;border:1px solid var(--border);border-radius:12px;padding:.75rem 1.5rem;color:var(--muted);font-family:'Manrope',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;margin-top:1rem; }
  .btn-back:hover { border-color:var(--accent1);color:var(--text); }
  .btn-clear { background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.4rem .9rem;color:rgba(239,68,68,.7);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s; }
  .btn-clear:hover { border-color:var(--wrong);color:var(--wrong); }

  /* Pulse on timer danger */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .timer-danger-pulse { animation:pulse .6s infinite; }

  /* toast */
  .toast { position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e1e30;border:1px solid var(--border);border-radius:10px;padding:.8rem 1.4rem;font-size:.85rem;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- REGISTRATION -->
<div class="screen active" id="reg-screen">
  <div class="logo-area">
    <div class="logo-badge">🚀 <span>Tech Quiz 2026</span></div>
    <h1>Перевір свої знання<br>в технологіях</h1>
    <p class="subtitle">20 питань · Рейтинг учасників · Найшвидший виграє</p>
  </div>

  <div class="reg-card">
    <h2>Реєстрація</h2>
    <div class="field">
      <label>ПІБ</label>
      <input type="text" id="inp-name" placeholder="Іваненко Іван Іванович" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="ivan@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Номер телефону</label>
      <input type="tel" id="inp-phone" placeholder="+38 (0XX) XXX-XX-XX" autocomplete="tel">
    </div>

    <label class="consent-row" id="consent-row">
      <input type="checkbox" id="inp-consent">
      <span>Я даю згоду на обробку моїх персональних даних (ПІБ, email, телефон) відповідно до Закону України «Про захист персональних даних»</span>
    </label>

    <button class="btn-start" id="btn-start" onclick="startQuiz()">Розпочати вікторину →</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz-screen">
  <div class="quiz-shell">
    <div class="quiz-header">
      <div class="qh-info">
        <div class="qh-name" id="qh-name"></div>
        <div class="qh-cat" id="qh-cat"></div>
      </div>
      <div class="progress-area">
        <div class="progress-label"><span id="prog-text">Питання 1 з 5</span></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="score-chip">Бали: <span id="score-disp">0</span></div>
    </div>

    <div class="timer-area">
      <div class="timer-ring-wrap" id="timer-wrap">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="timer-ring-bg" cx="32" cy="32" r="28"/>
          <circle class="timer-ring-prog" id="timer-ring" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timer-num">30</div>
      </div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-meta">
        <div class="q-num" id="q-num">Питання 1</div>
        <div class="q-tag" id="q-tag"></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="q-code" id="q-code" style="display:none"></div>
      <div class="answers" id="answers"></div>
      <div id="feedback"></div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Наступне питання →</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="result-screen">
  <div class="result-card">
    <span class="trophy" id="trophy-icon">🏆</span>
    <div class="result-name" id="res-name"></div>
    <div class="result-cat" id="res-cat"></div>
    <div class="score-big" id="res-score">0</div>
    <div class="score-total" id="res-total"></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val green" id="res-correct">0</div><div class="stat-lbl">Правильних</div></div>
      <div class="stat-box"><div class="stat-val red" id="res-wrong">0</div><div class="stat-lbl">Неправильних</div></div>
      <div class="stat-box"><div class="stat-val yellow" id="res-time">0</div><div class="stat-lbl">Сек заощаджено</div></div>
    </div>
    <button class="btn-rating" onclick="showLeaderboard()">Переглянути рейтинг 🏅</button>
    <button class="btn-restart" onclick="restartQuiz()">Спробувати ще раз</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="lb-screen">
  <div class="lb-card">
    <div class="lb-header">
      <div class="lb-title">🏅 Рейтинг учасників</div>
      <button class="btn-clear" onclick="clearLeaderboard()">Очистити</button>
    </div>
    <div class="lb-table" id="lb-table"></div>
  </div>
  <button class="btn-back" onclick="backFromLb()">← Назад</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────── DATA ───────────────
const QUIZ_DATA = {
  programming: {
    label: '💻 Програмування',
    questions: [
      {
        text: 'Python: Що виведе цей код при другому виклику функції?\nЦе одна з найпідступніших особливостей Python.',
        code: 'def append_to(element, to=[]):\n    to.append(element)\n    return to\n\nmy_list = append_to(10)\nprint(append_to(20))',
        answers: ['А) [20]','Б) [10, 20]','В) Error: list is not defined','Г) [10]'],
        correct: 1,
        explanation: 'Аргументи за замовчуванням (to=[]) створюються ОДИН РАЗ при визначенні функції. При кожному виклику функція використовує той самий список, що вже був змінений раніше.',
        type: 'code', time: 45
      },
      {
        text: 'Мова C: Яке значення буде надруковано? Зверни увагу на те, як оператор ++ взаємодіє з розіменуванням *.',
        code: 'int arr[] = {10, 20, 30};\nint *p = arr;\nprintf("%d, ", *p++);\nprintf("%d", *p);',
        answers: ['А) 10, 10','Б) 11, 20','В) 10, 20','Г) 20, 30'],
        correct: 2,
        explanation: '*p++ спочатку повертає значення (10), а потім зсуває вказівник. Тому другий printf бачить наступний елемент — 20.',
        type: 'code', time: 45
      },
      {

// ─────────────── STORAGE ───────────────
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('quiz_lb') || '[]'); }
  catch { return []; }
}
function saveLeaderboard(lb) {
  localStorage.setItem('quiz_lb', JSON.stringify(lb));
}
function addToLeaderboard(entry) {
  let lb = getLeaderboard();
  lb.push(entry);
  lb.sort((a,b) => b.score - a.score || a.timeTaken - b.timeTaken);
  saveLeaderboard(lb);
}

// ─────────────── UI HELPERS ───────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
// ─────────────── GOOGLE SHEETS ───────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyQ814VQE9OIrIUs55GTr09tqRDbEIMbQbZKhqoVjVc0MbZY4OVVYrQR-Jv6TdCmzEJ/exec';

async function sendToSheets(entry) {
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date: entry.dateStr,
        name: entry.name,
        email: entry.email,
        phone: entry.phone,
        score: entry.score,
        correct: entry.correct,
        total: entry.total,
        timeSaved: entry.timeSaved
      })
    });
  } catch(e) { console.warn('Sheets send failed:', e); }
}

// ─────────────── REGISTRATION ───────────────
function startQuiz() {
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const consent = document.getElementById('inp-consent').checked;

  if (!name) { showToast('⚠️ Введіть ПІБ'); return; }
  if (!email || !email.includes('@')) { showToast('⚠️ Введіть коректний email'); return; }
  if (!phone) { showToast('⚠️ Введіть номер телефону'); return; }
  if (!consent) {
    document.getElementById('consent-row').classList.add('error');
    showToast('⚠️ Дайте згоду на обробку даних'); return;
  }
  document.getElementById('consent-row').classList.remove('error');

  // Combine all questions into one quiz
  const allQuestions = [
    ...QUIZ_DATA.programming.questions,
    ...QUIZ_DATA.iot.questions,
    ...QUIZ_DATA.cyber.questions
  ];

  state.participant = { name, email, phone };
  state.category = 'all';
  state.questions = shuffle(allQuestions);
  state.currentIdx = 0; state.score = 0; state.correctCount = 0;
  state.wrongCount = 0; state.savedSeconds = 0;

  document.getElementById('qh-name').textContent = name;
  document.getElementById('qh-cat').textContent = '💻 Програмування · 🔌 IoT · 🛡️ Кібербезпека';

  showScreen('quiz-screen');
  renderQuestion();
}

// ─────────────── QUIZ ───────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion() {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  state.answered = false;

  // Progress
  const pct = (state.currentIdx / total) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `Питання ${state.currentIdx + 1} з ${total}`;
  document.getElementById('score-disp').textContent = state.score;

  // Meta
  document.getElementById('q-num').textContent = `Питання ${state.currentIdx + 1}`;
  const tagEl = document.getElementById('q-tag');
  const tagMap = { code: ['code','💻 Код'], logic: ['logic','🧠 Логіка'], cyber: ['cyber','🛡️ Cyber'], iot: ['iot','🔌 IoT'] };
  const [cls, lbl] = tagMap[q.type] || ['logic','❓'];
  tagEl.className = 'q-tag ' + cls;
  tagEl.textContent = lbl;

  // Text & code
  document.getElementById('q-text').textContent = q.text;
  const codeEl = document.getElementById('q-code');
  if (q.code) { codeEl.textContent = q.code; codeEl.style.display = 'block'; }
  else { codeEl.style.display = 'none'; }

  // Answers
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  const letters = ['А','Б','В','Г'];
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ans-letter">${letters[i]}</span><span>${ans.replace(/^[А-Г]\) /,'')}</span>`;
    btn.onclick = () => selectAnswer(i, q);
    answersEl.appendChild(btn);
  });

  document.getElementById('feedback').innerHTML = '';
  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('show');
  btnNext.textContent = state.currentIdx < total - 1 ? 'Наступне питання →' : 'Завершити вікторину 🎉';

  // Timer
  startTimer(q.time);
}

function startTimer(seconds) {
  clearInterval(state.timerInterval);
  state.timeLeft = seconds;
  const CIRC = 175.9;
  const ring = document.getElementById('timer-ring');
  const num = document.getElementById('timer-num');
  const wrap = document.getElementById('timer-wrap');
  wrap.classList.remove('timer-danger-pulse');

  function tick() {
    const pct = state.timeLeft / seconds;
    ring.style.strokeDashoffset = CIRC * (1 - pct);
    num.textContent = state.timeLeft;

    if (pct > 0.5) { ring.style.stroke = 'var(--accent2)'; num.style.color = 'var(--text)'; }
    else if (pct > 0.25) { ring.style.stroke = 'var(--timer-warning)'; num.style.color = 'var(--timer-warning)'; }
    else { ring.style.stroke = 'var(--timer-danger)'; num.style.color = 'var(--timer-danger)'; wrap.classList.add('timer-danger-pulse'); }

    if (state.timeLeft <= 0) { clearInterval(state.timerInterval); timeOut(); return; }
    state.timeLeft--;
  }
  tick();
  state.timerInterval = setInterval(tick, 1000);
}

function timeOut() {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIdx];
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach((b, i) => { b.disabled = true; if (i === q.correct) b.classList.add('correct'); });
  document.getElementById('feedback').innerHTML = `<div class="timeout-banner">⏰ Час вийшов! Правильна відповідь виділена.</div>`;
  state.wrongCount++;
  document.getElementById('btn-next').classList.add('show');
}

function selectAnswer(idx, q) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const savedTime = state.timeLeft;
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === q.correct;
  btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.correct].classList.add('correct');

  if (isCorrect) {
    const bonus = Math.ceil((savedTime / q.time) * 50);
    state.score += 100 + bonus;
    state.correctCount++;
    state.savedSeconds += savedTime;
    document.getElementById('score-disp').textContent = state.score;
    document.getElementById('feedback').innerHTML = `<div class="explanation">✅ <strong>Правильно!</strong> (+${100+bonus} балів, +${bonus} за швидкість)<br><br>${q.explanation}</div>`;
  } else {
    state.wrongCount++;
    document.getElementById('feedback').innerHTML = `<div class="explanation wrong-exp">❌ <strong>Неправильно!</strong><br><br>${q.explanation}</div>`;
  }

  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.questions.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

// ─────────────── FINISH ───────────────
function finishQuiz() {
  clearInterval(state.timerInterval);
  const total = state.questions.length;
  const pct = Math.round((state.correctCount / total) * 100);

  const trophies = { 100:'🏆', 80:'🥇', 60:'🥈', 40:'🥉', 0:'🎖️' };
  const trophy = Object.entries(trophies).reverse().find(([p]) => pct >= +p)[1];

  document.getElementById('trophy-icon').textContent = trophy;
  document.getElementById('res-name').textContent = state.participant.name;
  document.getElementById('res-cat').textContent = state.participant.email + ' · ' + state.participant.phone;
  document.getElementById('res-score').textContent = state.score;
  document.getElementById('res-total').textContent = `${state.correctCount} з ${total} правильних (${pct}%)`;
  document.getElementById('res-correct').textContent = state.correctCount;
  document.getElementById('res-wrong').textContent = state.wrongCount;
  document.getElementById('res-time').textContent = state.savedSeconds;

  const dateStr = new Date().toLocaleString('uk-UA', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const entry = {
    name: state.participant.name,
    email: state.participant.email,
    phone: state.participant.phone,
    category: 'all',
    catLabel: '💻+🔌+🛡️',
    score: state.score,
    correct: state.correctCount,
    total: total,
    timeSaved: state.savedSeconds,
    timeTaken: Date.now(),
    dateStr
  };

  addToLeaderboard(entry);
  sendToSheets(entry);

  showScreen('result-screen');
}

// ─────────────── LEADERBOARD ───────────────
function showLeaderboard() {
  renderLbFromSheets();
  showScreen('lb-screen');
}

async function renderLbFromSheets() {
  const el = document.getElementById('lb-table');
  el.innerHTML = '<div class="lb-empty">⏳ Завантаження рейтингу...</div>';
  try {
    const res = await fetch(SHEETS_URL + '?action=get');
    const data = await res.json();
    if (!data.rows || !data.rows.length) {
      el.innerHTML = '<div class="lb-empty">Поки що немає результатів 🕳️</div>'; return;
    }
    // rows: [date, name, email, phone, score, correct, total, timeSaved]
    const sorted = data.rows.sort((a,b) => Number(b[4]) - Number(a[4]));
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = sorted.map((r, i) => `
      <div class="lb-row ${i<3?'top'+(i+1):''}">
        <div class="lb-rank ${i<3?'r'+(i+1):''}">${i<3 ? medals[i] : (i+1)}</div>
        <div>
          <div class="lb-pname">${escHtml(r[1])}</div>
          <div class="lb-ptime">${r[0]}</div>
        </div>
        <div>
          <div class="lb-score">${r[4]}</div>
          <div class="lb-ptime">${r[5]}/${r[6]} · ⚡${r[7]}с</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    // fallback to localStorage
    renderLbLocal();
  }
}

function renderLbLocal() {
  let lb = getLeaderboard();
  lb.sort((a,b) => b.score - a.score);
  const el = document.getElementById('lb-table');
  if (!lb.length) { el.innerHTML = '<div class="lb-empty">Поки що немає результатів 🕳️</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = lb.map((e, i) => `
    <div class="lb-row ${i<3?'top'+(i+1):''}">
      <div class="lb-rank ${i<3?'r'+(i+1):''}">${i<3 ? medals[i] : (i+1)}</div>
      <div>
        <div class="lb-pname">${escHtml(e.name)}</div>
        <div class="lb-ptime">${e.dateStr}</div>
      </div>
      <div>
        <div class="lb-score">${e.score}</div>
        <div class="lb-ptime">${e.correct}/${e.total} · ⚡${e.timeSaved}с</div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLeaderboard() {
  if (!confirm('Очистити локальний рейтинг?')) return;
  localStorage.removeItem('quiz_lb');
  renderLbFromSheets();
  showToast('Локальний рейтинг очищено');
}

function backFromLb() {
  if (state.participant) showScreen('result-screen');
  else showScreen('reg-screen');
}

function restartQuiz() {
  showScreen('reg-screen');
}
</script>
